name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
    - name: Install LION and test dependencies
      run: python -m pip install -e ".[tests]"
    - name: Run hardware-appropriate test suite
      run: python scripts/run_tests.py -q
